<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>
<div layout:fragment="content">
    <h2 th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">Add Product</h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Product name">
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></div>
        </div>

        <div class="mb-3">
            <label for="image" class="form-label">Image URL</label>
            <input id="image" type="text" class="form-control" th:field="*{image}" placeholder="https://...">
            <div th:if="${#fields.hasErrors('image')}" th:errors="*{image}" class="text-danger small"></div>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Price</label>
            <input id="price" type="number" class="form-control" th:field="*{price}" placeholder="Price">
            <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger small"></div>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <select id="category" class="form-select" th:field="*{category.id}">
                <option value="">Select category</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"></option>
            </select>
            <div th:if="${#fields.hasErrors('category.id')}" th:errors="*{category.id}" class="text-danger small"></div>
        </div>

        <button type="submit" class="btn btn-success">Save Product</button>
        <a th:href="@{/products}" class="btn btn-outline-secondary">Back</a>
    </form>
</div>
</body>
</html>
